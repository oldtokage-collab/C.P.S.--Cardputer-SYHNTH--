; CPS (CardPuter Synth) - CardputerADV用シンセサイザー
; PlatformIO + Arduinoフレームワーク

[env:cps]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 1500000
monitor_speed = 115200

build_flags =
    -DESP32S3
    -DCORE_DEBUG_LEVEL=2
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; M5Unified を内部で利用する M5Cardputer ライブラリ一式
; (Cardputer / Cardputer-Adv 両対応)
; 注意: M5Cardputer 1.1.0には z/c/b/m の大文字変換に既知のバグがあるため、
; 1.1.1以上を明示的に指定する(Z/Xキーをベンドに使っているため特に重要)。
lib_deps =
    m5stack/M5Cardputer @ ^1.1.1
    m5stack/M5Unified @ ^0.2.8
    m5stack/M5GFX @ ^0.2.10

; 注記: SD / SPI は Arduino-ESP32 コアに内蔵されているため
; lib_deps への追加は不要(#include <SD.h> / <SPI.h> だけで使える)。
