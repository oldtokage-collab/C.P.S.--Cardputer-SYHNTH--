; C.P.S. CardPuter Synth - CardputerADV synthesizer
; PlatformIO + Arduino framework

[env:cps]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 1500000
monitor_speed = 115200

build_flags =
    -DESP32S3
    -DCORE_DEBUG_LEVEL=2
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; M5Cardputer library suite (includes M5Unified / M5GFX)
; v1.1.0 has a known bug with z/c/b/m key mapping -> require >= 1.1.1
lib_deps =
    m5stack/M5Cardputer @ ^1.1.1
    m5stack/M5Unified @ ^0.2.8
    m5stack/M5GFX @ ^0.2.10

; Note: SD and SPI are part of the Arduino-ESP32 core;
; no extra lib_deps entry is needed.

; Post-build script: merges bootloader + partitions + firmware into
; a single file (.pio/build/cps/merge.bin)
; suitable for M5Burner or any single-file ESP32 flash tool.
extra_scripts = post:merge_bin.py
